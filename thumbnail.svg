<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="redline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#ff3355"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 우측 워터마크 텍스트 -->
  <text x="820" y="420" font-family="monospace" font-size="220" font-weight="700"
        fill="rgba(255,255,255,0.03)" letter-spacing="-8">EXAONE</text>

  <!-- 상단 빨간 바 -->
  <rect x="0" y="0" width="6" height="630" fill="url(#redline)"/>
  <rect x="80" y="72" width="200" height="4" fill="url(#redline)" rx="2"/>

  <!-- 태그 -->
  <rect x="80" y="82" width="160" height="30" fill="#C8102E" rx="3"/>
  <text x="160" y="102" font-family="monospace" font-size="13" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="2">AI MODEL REVIEW</text>

  <!-- 메인 제목 -->
  <text x="80" y="190" font-family="Georgia, serif" font-size="72" font-weight="900"
        fill="white" letter-spacing="-2">EXAONE Deep 32B</text>
  <text x="80" y="265" font-family="Georgia, serif" font-size="52" font-weight="700"
        fill="#C8102E">왜 선택하는가</text>

  <!-- 부제 -->
  <text x="80" y="315" font-family="sans-serif" font-size="20" font-weight="300"
        fill="rgba(255,255,255,0.55)">GPT · Gemini · DeepSeek와의 비교 분석 · 공식 벤치마크 기반</text>

  <!-- 구분선 -->
  <rect x="80" y="345" width="1040" height="1" fill="rgba(255,255,255,0.1)"/>

  <!-- 수치 카드 4개 -->
  <!-- card 1 -->
  <rect x="80" y="370" width="220" height="100" fill="rgba(255,255,255,0.05)" rx="6"/>
  <rect x="80" y="370" width="220" height="3" fill="#C8102E" rx="2"/>
  <text x="190" y="420" font-family="monospace" font-size="38" font-weight="700"
        fill="white" text-anchor="middle">94.5%</text>
  <text x="190" y="448" font-family="sans-serif" font-size="13"
        fill="rgba(255,255,255,0.45)" text-anchor="middle">수능 수학 정답률</text>

  <!-- card 2 -->
  <rect x="320" y="370" width="220" height="100" fill="rgba(255,255,255,0.05)" rx="6"/>
  <rect x="320" y="370" width="220" height="3" fill="#C8102E" rx="2"/>
  <text x="430" y="420" font-family="monospace" font-size="38" font-weight="700"
        fill="white" text-anchor="middle">95.7%</text>
  <text x="430" y="448" font-family="sans-serif" font-size="13"
        fill="rgba(255,255,255,0.45)" text-anchor="middle">MATH-500</text>

  <!-- card 3 -->
  <rect x="560" y="370" width="220" height="100" fill="rgba(255,255,255,0.05)" rx="6"/>
  <rect x="560" y="370" width="220" height="3" fill="#C8102E" rx="2"/>
  <text x="670" y="420" font-family="monospace" font-size="38" font-weight="700"
        fill="white" text-anchor="middle">5%</text>
  <text x="670" y="448" font-family="sans-serif" font-size="13"
        fill="rgba(255,255,255,0.45)" text-anchor="middle">DeepSeek 대비 파라미터</text>

  <!-- card 4 -->
  <rect x="800" y="370" width="220" height="100" fill="rgba(255,255,255,0.05)" rx="6"/>
  <rect x="800" y="370" width="220" height="3" fill="#C8102E" rx="2"/>
  <text x="910" y="420" font-family="monospace" font-size="38" font-weight="700"
        fill="white" text-anchor="middle">#1</text>
  <text x="910" y="448" font-family="sans-serif" font-size="13"
        fill="rgba(255,255,255,0.45)" text-anchor="middle">Epoch AI Notable Models</text>

  <!-- 하단 출처 -->
  <text x="80" y="570" font-family="sans-serif" font-size="14"
        fill="rgba(255,255,255,0.25)">Source: LG AI Research · arXiv 2412.04862 · arXiv 2503.12524 · ZDNet Korea 2025.03</text>

  <!-- 하단 우측 로고 -->
  <text x="1120" y="570" font-family="monospace" font-size="14" font-weight="700"
        fill="rgba(255,255,255,0.25)" text-anchor="end">CHA Univ. AI Healthcare</text>
</svg>
